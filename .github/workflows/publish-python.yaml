name: Publish Python SDK

on:
  push:
    branches: [main]
    paths:
      - "python/**"
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate date-based version
        id: version
        run: |
          DATE_PREFIX=$(date +'%Y.%-m.%-d')
          pip install requests -q
          LATEST_BUILD=$(python -c "
          import requests
          try:
              resp = requests.get('https://pypi.org/pypi/acedatacloud/json', timeout=10)
              if resp.status_code == 200:
                  versions = resp.json().get('releases', {}).keys()
                  today_prefix = '${DATE_PREFIX}'
                  today_versions = [v for v in versions if v.startswith(today_prefix)]
                  if today_versions:
                      builds = []
                      for v in today_versions:
                          parts = v.split('.')
                          if len(parts) == 4:
                              builds.append(int(parts[3]))
                      print(max(builds) + 1 if builds else 0)
                  else:
                      print(0)
              else:
                  print(0)
          except:
              print(0)
          ")
          VERSION="${DATE_PREFIX}.${LATEST_BUILD}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: Update version in pyproject.toml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          python -c "
          import re
          with open('pyproject.toml', 'r') as f:
              content = f.read()
          content = re.sub(r'version = \"[^\"]+\"', f'version = \"$VERSION\"', content, count=1)
          with open('pyproject.toml', 'w') as f:
              f.write(content)
          "
          echo "Updated pyproject.toml to version $VERSION"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: python/dist/

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"

      - name: Run tests
        run: pytest -v

  publish-pypi:
    name: Publish to PyPI
    needs: [build, test]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/acedatacloud/${{ needs.build.outputs.version }}
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install "twine>=6.0.0"
          twine upload dist/*

  create-release:
    name: Create GitHub Release
    if: github.event_name == 'push'
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create "python-v${{ needs.build.outputs.version }}" dist/* \
            --title "Python SDK v${{ needs.build.outputs.version }}" \
            --generate-notes \
            --repo '${{ github.repository }}' || echo "Release already exists, skipping"
